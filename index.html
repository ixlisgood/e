<title>Activities Access</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#111;
    padding:30px;
    border:2px solid #333;
    border-radius:10px;
    text-align:center;
    width:320px;
}

input{
    width:90%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:6px;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#333;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#555;
}

#error{
    color:red;
    margin-top:10px;
}
</style>



<div class="login-box">
    <h2>Enter Access Code</h2>
    <input type="password" id="codeBox" placeholder="Enter Code">
    <br>
    <button onclick="checkCode()">Enter</button>
    <div id="error"></div>
</div>

<script>
function checkCode(){
    let code = document.getElementById("codeBox").value;

    if(code === "183663"){   // CHANGE THIS CODE
        window.location.href = "activities.html";
    } else {
        document.getElementById("error").textContent = "Wrong Code";
    }
}
</script>
