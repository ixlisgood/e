<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Activities</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        header {
            padding: 12px;
            background: #fc2651;
            display: flex;
            gap: 10px;
            align-items: center;
            position: sticky;
            top: 0;
        }

        input, select {
            padding: 8px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        #container, #featured {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            padding: 12px;
        }

        .zone {
            background: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }

        .zone:hover {
            transform: scale(1.03);
        }

        .zone img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .zone button {
            width: 100%;
            padding: 10px;
            border: none;
            background: none;
            color: white;
            cursor: pointer;
        }

        #viewer {
            position: fixed;
            inset: 0;
            background: black;
            display: none;
            flex-direction: column;
        }

        #viewer iframe {
            flex: 1;
            border: none;
        }

        #topbar {
            padding: 10px;
            background: #111;
            display: flex;
            justify-content: space-between;
        }

        #topbar button {
            padding: 6px 10px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<header>
    <strong>Activities</strong>
    <input id="search" placeholder="Search..." oninput="render()"/>
    <select id="sort" onchange="render()">
        <option value="name">Name</option>
        <option value="id">ID</option>
    </select>
    <button onclick="window.location.href='textroom.html'" style="padding: 8px; border-radius: 6px; border: none; outline: none; cursor: pointer; background: white; color: black; font-weight: bold;">Chat Room</button>
</header>

<div id="featured"></div>
<div id="container">Loading...</div>

<div id="viewer">
    <div id="topbar">
        <span id="title">Zone</span>
        <div>
            <button onclick="closeZone()">Close</button>
        </div>
    </div>
    <iframe id="frame"></iframe>
</div>

<script>
const container = document.getElementById("container");
const featured = document.getElementById("featured");
const search = document.getElementById("search");
const sort = document.getElementById("sort");

let zones = [];

const zonesURL = "https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json";
const coverURL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
const htmlURL = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";

async function loadZones() {
    const res = await fetch(zonesURL);
    zones = await res.json();

    render();
}

function render() {
    let list = [...zones];

    const q = search.value.toLowerCase();
    if (q) {
        list = list.filter(z => z.name.toLowerCase().includes(q));
    }

    if (sort.value === "name") {
        list.sort((a,b)=>a.name.localeCompare(b.name));
    } else if (sort.value === "id") {
        list.sort((a,b)=>a.id - b.id);
    }

    const featuredList = list.filter(z => z.featured);
    const normalList = list;

    featured.innerHTML = featuredList.map(makeZone).join("");
    container.innerHTML = normalList.map(makeZone).join("");
}

function makeZone(z) {
    const img = (z.cover || "").replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);

    return `
        <div class="zone" onclick="openZone(${z.id})">
            <img src="${img}" />
            <button>${z.name}</button>
        </div>
    `;
}

function openZone(id) {
    const z = zones.find(x => x.id === id);
    if (!z) return;

    const frame = document.getElementById("frame");
    const viewer = document.getElementById("viewer");

    if (z.url.startsWith("http")) {
        window.open(z.url, "_blank");
        return;
    }

    const url = z.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);

    fetch(url)
        .then(r => r.text())
        .then(html => {
            frame.srcdoc = html;
            document.getElementById("title").textContent = z.name;
            viewer.style.display = "flex";
        });
}

function closeZone() {
    document.getElementById("viewer").style.display = "none";
    document.getElementById("frame").srcdoc = "";
}

loadZones();
</script>

</body>
</html>
